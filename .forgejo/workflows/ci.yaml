name: ci

on:
    push:
        branches:
            - main
            - dev
    pull_request:
    workflow_dispatch:

jobs:
    ci-base-image:
        runs-on: docker
        container:
            image: ghcr.io/catthehacker/ubuntu:act-latest
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Ensure docker cli exists
              shell: bash
              run: |
                  set -euo pipefail
                  if command -v docker >/dev/null 2>&1; then
                    docker --version
                    exit 0
                  fi

                  apt-get update
                  apt-get install -y docker.io
                  docker --version

            - name: Build and push CI base image
              shell: bash
              env:
                  HARBOR_HOST: ${{ vars.HARBOR_HOST || env.HARBOR_HOST }}
                  HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME || env.HARBOR_USERNAME }}
                  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD || env.HARBOR_PASSWORD }}
                  LOCAL_SHA: ${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
              run: |
                  set -euo pipefail

                  source_docker_config="${DOCKER_CONFIG:-/root/.docker}"
                  writable_docker_config="/tmp/ksbh-docker-config"
                  writable_buildx_config="/tmp/ksbh-docker-buildx"
                  mkdir -p "${writable_docker_config}" "${writable_buildx_config}"
                  if [ -f "${source_docker_config}/config.json" ]; then
                    cp "${source_docker_config}/config.json" "${writable_docker_config}/config.json"
                  fi
                  export DOCKER_CONFIG="${writable_docker_config}"
                  export BUILDX_CONFIG="${writable_buildx_config}"

                  if [ -z "${HARBOR_HOST:-}" ]; then
                    echo "HARBOR_HOST is required to publish the CI base image" >&2
                    exit 1
                  fi

                  ci_image_repository="${HARBOR_HOST}/registry/ksbh-ci"
                  ci_image="${ci_image_repository}:${LOCAL_SHA}"

                  if [ -n "${HARBOR_USERNAME:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
                    echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_HOST}" --username "${HARBOR_USERNAME}" --password-stdin
                  else
                    echo "HARBOR_USERNAME/HARBOR_PASSWORD not set, relying on preconfigured Docker auth"
                  fi

                  docker build --pull --file docker/build/ci.Dockerfile --tag "${ci_image}" .
                  docker push "${ci_image}"

    rust-cache-prime:
        needs:
            - ci-base-image
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Restore CI caches
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      /root/.cargo/registry
                      /root/.cargo/git
                      /root/.local/share/mise
                      /root/.cache/mise
                  key: ci-deps-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock', 'mise.toml', '.mise.toml') }}
                  restore-keys: |
                      ci-deps-${{ runner.os }}-

            - name: Restore Rust target cache
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      crates/target
                  key: ci-rust-target-${{ runner.os }}-${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
                  restore-keys: |
                      ci-rust-target-${{ runner.os }}-

            - name: Prime Rust workspace cache
              shell: bash
              run: |
                  set -euo pipefail
                  export PATH="$HOME/.local/bin:$PATH"
                  chmod +x mise-tasks/build
                  env -u GH_TOKEN -u GITHUB_TOKEN mise install
                  mise run build
                  mise x rust@1.92.0 -- cargo test --manifest-path crates/Cargo.toml -p tests --no-run

    release-image-build:
        needs:
            - ci-base-image
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Build release Docker image
              uses: ./.forgejo/actions/run-mise-task
              with:
                  task: build-release-image
                  chmod-paths: mise-tasks/build-release-image mise-tasks/lib.sh

    miri-image-build:
        needs:
            - ci-base-image
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Build Miri Docker image
              shell: bash
              env:
                  KSBH_MIRI_IMAGE: ksbh:miri
              run: |
                  set -euo pipefail

                  source_docker_config="${DOCKER_CONFIG:-/root/.docker}"
                  writable_docker_config="/tmp/ksbh-docker-config"
                  writable_buildx_config="/tmp/ksbh-docker-buildx"
                  mkdir -p "${writable_docker_config}" "${writable_buildx_config}"
                  if [ -f "${source_docker_config}/config.json" ]; then
                    cp "${source_docker_config}/config.json" "${writable_docker_config}/config.json"
                  fi
                  export DOCKER_CONFIG="${writable_docker_config}"
                  export BUILDX_CONFIG="${writable_buildx_config}"

                  DOCKER_BUILDKIT=1 docker build --pull --load \
                    --file docker/build/miri.Dockerfile \
                    --tag "${KSBH_MIRI_IMAGE}" \
                    .

    e2e-binary:
        continue-on-error: ${{ (forge.ref_name || env.FORGEJO_REF_NAME || env.LOCAL_REF_NAME) == 'dev' }}
        needs:
            - rust-cache-prime
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Restore CI caches
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      /root/.cargo/registry
                      /root/.cargo/git
                      /root/.local/share/mise
                      /root/.cache/mise
                  key: ci-deps-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock', 'mise.toml', '.mise.toml') }}
                  restore-keys: |
                      ci-deps-${{ runner.os }}-

            - name: Restore Rust target cache
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      crates/target
                  key: ci-rust-target-${{ runner.os }}-${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
                  restore-keys: |
                      ci-rust-target-${{ runner.os }}-

            - name: Run direct-binary e2e task
              uses: ./.forgejo/actions/run-mise-task
              with:
                  task: e2e-binary
                  chmod-paths: mise-tasks/e2e-binary

    modules-memory-check:
        continue-on-error: ${{ (forge.ref_name || env.FORGEJO_REF_NAME || env.LOCAL_REF_NAME) == 'dev' }}
        needs:
            - rust-cache-prime
            - miri-image-build
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Restore CI caches
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      /root/.cargo/registry
                      /root/.cargo/git
                      /root/.local/share/mise
                      /root/.cache/mise
                  key: ci-deps-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock', 'mise.toml', '.mise.toml') }}
                  restore-keys: |
                      ci-deps-${{ runner.os }}-

            - name: Restore Rust target cache
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      crates/target
                  key: ci-rust-target-${{ runner.os }}-${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
                  restore-keys: |
                      ci-rust-target-${{ runner.os }}-

            - name: Run native dynamic-module smoke task
              uses: ./.forgejo/actions/run-mise-task
              env:
                  KSBH_DYNAMIC_SMOKE_LOOPS: "500"
              with:
                  task: dynamic-modules-smoke
                  chmod-paths: mise-tasks/dynamic-modules-smoke

            - name: Run Miri SDK FFI task
              uses: ./.forgejo/actions/run-mise-task
              with:
                  task: miri-modules-sdk-ffi
                  task-args: --skip-build
                  chmod-paths: mise-tasks/miri-modules-sdk-ffi mise-tasks/lib.sh

    e2e-kubernetes:
        continue-on-error: ${{ (forge.ref_name || env.FORGEJO_REF_NAME || env.LOCAL_REF_NAME) == 'dev' }}
        needs:
            - e2e-binary
            - modules-memory-check
            - release-image-build
        runs-on: kind
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Restore CI caches
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      /root/.cargo/registry
                      /root/.cargo/git
                      /root/.local/share/mise
                      /root/.cache/mise
                  key: ci-deps-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock', 'mise.toml', '.mise.toml') }}
                  restore-keys: |
                      ci-deps-${{ runner.os }}-

            - name: Restore Rust target cache
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      crates/target
                  key: ci-rust-target-${{ runner.os }}-${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
                  restore-keys: |
                      ci-rust-target-${{ runner.os }}-

            - name: Restore Playwright cache
              uses: https://data.forgejo.org/actions/cache@v4
              with:
                  path: |
                      tests/playwright/node_modules
                      /root/.cache/ms-playwright
                  key: ci-playwright-${{ runner.os }}-${{ hashFiles('tests/playwright/package.json', 'tests/playwright/package-lock.json') }}
                  restore-keys: |
                      ci-playwright-${{ runner.os }}-

            - name: Install Playwright
              uses: ./.forgejo/actions/install-playwright

            - name: Install kind
              shell: bash
              run: |
                  set -euo pipefail
                  curl -fsSL -o /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
                  chmod +x /usr/local/bin/kind
                  kind --version

            - name: Run kubernetes e2e task
              uses: ./.forgejo/actions/run-mise-task
              env:
                  KIND_CLUSTER_CONFIG: tests/kind/cluster-ci.yaml
                  KSBH_KIND_API_SERVER_PORT: "16443"
              with:
                  task: e2e
                  task-args: --skip-build
                  chmod-paths: mise-tasks/e2e mise-tasks/e2e-kubernetes-provider mise-tasks/build-release-image mise-tasks/lib.sh

    publish-images:
        needs:
            - e2e-kubernetes
        if: ${{ forge.event_name != 'pull_request' }}
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Build and push image
              shell: bash
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || env.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || env.DOCKERHUB_TOKEN }}
                  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || env.DOCKERHUB_REPOSITORY }}
                  HARBOR_HOST: ${{ vars.HARBOR_HOST || env.HARBOR_HOST }}
                  HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME || env.HARBOR_USERNAME }}
                  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD || env.HARBOR_PASSWORD }}
                  LOCAL_REF_NAME: ${{ forge.ref_name || env.FORGEJO_REF_NAME || env.LOCAL_REF_NAME }}
                  LOCAL_SHA: ${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
              run: |
                  set -euo pipefail
                  export PATH="$HOME/.local/bin:$PATH"

                  source_docker_config="${DOCKER_CONFIG:-/root/.docker}"
                  writable_docker_config="/tmp/ksbh-docker-config"
                  writable_buildx_config="/tmp/ksbh-docker-buildx"
                  mkdir -p "${writable_docker_config}" "${writable_buildx_config}"
                  if [ -f "${source_docker_config}/config.json" ]; then
                    cp "${source_docker_config}/config.json" "${writable_docker_config}/config.json"
                  fi
                  export DOCKER_CONFIG="${writable_docker_config}"
                  export BUILDX_CONFIG="${writable_buildx_config}"

                  chmod +x mise-tasks/build-docs-site-image
                  chmod +x mise-tasks/build-charts-site-image

                  image_repository="${DOCKERHUB_REPOSITORY:-${DOCKERHUB_USERNAME}/ksbh}"
                  docs_image_repository="${HARBOR_HOST}/registry/ksbh-docs"
                  charts_image_repository="${HARBOR_HOST}/registry/ksbh-charts"
                  source_release_image="${KSBH_RELEASE_IMAGE_LOCAL:-ksbh:release}"

                  if [ "${LOCAL_REF_NAME}" = "main" ]; then
                    primary_tag="$(grep -m1 '^version = "' crates/ksbh-bin/Cargo.toml | sed -E 's/^version = "([^"]+)"$/\1/')"
                    extra_tag=""
                  else
                    primary_tag="$(echo "${LOCAL_SHA}" | cut -c1-12)-$(date -u +%Y%m%d)"
                    extra_tag="latest-dev"
                  fi

                  if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
                    echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
                  else
                    echo "DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set, relying on preconfigured Docker auth"
                  fi

                  if [ -n "${HARBOR_HOST:-}" ] && [ -n "${HARBOR_USERNAME:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
                    echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_HOST}" --username "${HARBOR_USERNAME}" --password-stdin
                  else
                    echo "HARBOR_HOST/HARBOR_USERNAME/HARBOR_PASSWORD not set, relying on preconfigured Docker auth"
                  fi

                  export KSBH_DOCS_SITE_IMAGE="${docs_image_repository}:${primary_tag}"
                  export KSBH_CHARTS_SITE_IMAGE="${charts_image_repository}:${primary_tag}"

                  if ! docker image inspect "${source_release_image}" >/dev/null 2>&1; then
                    echo "expected prebuilt release image '${source_release_image}' not found" >&2
                    exit 1
                  fi

                  docker tag "${source_release_image}" "${image_repository}:${primary_tag}"
                  env -u GH_TOKEN -u GITHUB_TOKEN mise install
                  mise run build-docs-site-image
                  mise run build-charts-site-image
                  docker push "${image_repository}:${primary_tag}"
                  docker push "${docs_image_repository}:${primary_tag}"
                  docker push "${charts_image_repository}:${primary_tag}"

                  if [ -n "${extra_tag}" ]; then
                    docker tag "${image_repository}:${primary_tag}" "${image_repository}:${extra_tag}"
                    docker tag "${docs_image_repository}:${primary_tag}" "${docs_image_repository}:${extra_tag}"
                    docker tag "${charts_image_repository}:${primary_tag}" "${charts_image_repository}:${extra_tag}"
                    docker push "${image_repository}:${extra_tag}"
                    docker push "${docs_image_repository}:${extra_tag}"
                    docker push "${charts_image_repository}:${extra_tag}"
                  fi

    helm-chart-artifacts:
        needs:
            - publish-images
        if: ${{ forge.event_name != 'pull_request' }}
        runs-on: docker
        container:
            image: ${{ (vars.HARBOR_HOST || env.HARBOR_HOST) }}/registry/ksbh-ci:${{ forge.sha || env.FORGEJO_SHA || env.LOCAL_SHA }}
        permissions:
            contents: read
        steps:
            - name: Check out repository
              uses: https://data.forgejo.org/actions/checkout@v4

            - name: Run Helm chart lint task
              uses: ./.forgejo/actions/run-mise-task
              with:
                  task: lint-helm-chart
                  chmod-paths: mise-tasks/lint-helm-chart mise-tasks/lib.sh

            - name: Package Helm chart
              uses: ./.forgejo/actions/run-mise-task
              with:
                  task: package-helm-chart
                  chmod-paths: mise-tasks/package-helm-chart mise-tasks/lib.sh

            - name: Upload Helm chart artifact
              uses: https://data.forgejo.org/actions/upload-artifact@v4
              with:
                  name: ksbh-helm-chart-${{ forge.ref_name }}
                  path: dist/helm/*.tar.gz
                  if-no-files-found: error
