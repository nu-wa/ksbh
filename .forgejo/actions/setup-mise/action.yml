name: setup-mise
description: Install apt packages and mise, then add mise to PATH

inputs:
  apt-packages:
    description: Additional apt packages to install
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        apt_packages="ca-certificates curl zstd"

        if [ -n "${{ inputs.apt-packages }}" ]; then
          apt_packages="${apt_packages} ${{ inputs.apt-packages }}"
        fi

        apt-get update
        apt-get install -y ${apt_packages}

        echo "y" | sh -c "$(curl -fsSL https://mise.run)"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
