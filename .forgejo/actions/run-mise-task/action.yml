name: run-mise-task
description: Ensure task scripts are executable, install mise tools, and run one mise task

inputs:
  task:
    description: Mise task name to run
    required: true
  chmod-paths:
    description: Space-separated paths to chmod +x before running the task
    required: false
    default: ""
  task-args:
    description: Optional arguments passed to `mise run <task>`
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        MISE_QUIET: "true"
        MISE_TASK_OUTPUT: interleave
        MISE_YES: "true"
        NO_COLOR: "1"
      run: |
        set -euo pipefail
        export PATH="$HOME/.local/bin:$PATH"

        # Runner mounts /root/.docker as read-only for shared auth.
        # BuildKit/buildx needs a writable config/state directory.
        source_docker_config="${DOCKER_CONFIG:-/root/.docker}"
        writable_docker_config="/tmp/ksbh-docker-config"
        writable_buildx_config="/tmp/ksbh-docker-buildx"
        mkdir -p "${writable_docker_config}" "${writable_buildx_config}"
        if [ -f "${source_docker_config}/config.json" ]; then
          cp "${source_docker_config}/config.json" "${writable_docker_config}/config.json"
        fi
        export DOCKER_CONFIG="${writable_docker_config}"
        export BUILDX_CONFIG="${writable_buildx_config}"

        if [ -n "${{ inputs.chmod-paths }}" ]; then
          chmod +x ${{ inputs.chmod-paths }}
        fi

        env -u GH_TOKEN -u GITHUB_TOKEN mise install
        if [ -n "${{ inputs.task-args }}" ]; then
          # shellcheck disable=SC2086
          mise run "${{ inputs.task }}" ${{ inputs.task-args }}
        else
          mise run "${{ inputs.task }}"
        fi
