    extraPortMappings:
      - containerPort: 30080
        hostPort: 18080
        protocol: TCP
      - containerPort: 30443
        hostPort: 18443
        protocol: TCP
      - containerPort: 30082
        hostPort: 18082
        protocol: TCP
      - containerPort: 30083
        hostPort: 18083
        protocol: TCP
      - containerPort: 30084
        hostPort: 18084
        protocol: TCP
      - containerPort: 31080
        hostPort: 19080
        protocol: TCP
      - containerPort: 31443
        hostPort: 19443
        protocol: TCP
