[build]
jobs = 12
target-dir = "target"

[profile.release]
opt-level = "z"
lto = "fat"
strip = "symbols"
codegen-units = 1
panic = "abort"

[profile.profiling]
inherits = "release"
opt-level = 0
debug = 2
strip = "none"
lto = "off"
codegen-units = 1
incremental = false
panic = "abort"
overflow-checks = false
debug-assertions = true
