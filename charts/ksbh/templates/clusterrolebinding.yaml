{{- if eq .Values.configProvider.mode "kubernetes" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ksbh.fullname" . }}
  labels:
    {{- include "ksbh.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ksbh.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ksbh.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
