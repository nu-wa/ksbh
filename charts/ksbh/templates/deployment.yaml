apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ksbh.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksbh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ksbh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        profiles.grafana.com/memory.scrape: "true"
        profiles.grafana.com/memory.port: {{ .Values.service.profiling | quote }}
        profiles.grafana.com/memory.path: "/"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ksbh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ksbh.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ include "ksbh.persistenceClaimName" . }}
        {{- end }}
        {{- if eq .Values.configProvider.mode "file" }}
        - name: app-config
          configMap:
            name: {{ include "ksbh.fullname" . }}-app-config
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.http }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.service.https }}
              protocol: TCP
            - name: internal
              containerPort: {{ include "ksbh.internalPort" . }}
              protocol: TCP
            - name: prometheus
              containerPort: {{ .Values.service.prometheus }}
              protocol: TCP
            - name: profiling
              containerPort: {{ .Values.service.profiling }}
              protocol: TCP
          env:
            - name: DEBUG_LEVEL
              value: {{ .Values.env.DEBUG_LEVEL | quote }}
            {{- range $name, $value := .Values.configEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            - name: KSBH__COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ksbh.cookieKeySecretName" . }}
                  key: {{ .Values.cookieKeySecret.key }}
            {{- if eq .Values.configProvider.mode "file" }}
            - name: KSBH__CONFIG_PATHS__CONFIG
              value: {{ .Values.app.configPaths.config | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: app-data
              mountPath: {{ .Values.persistence.mountPath | quote }}
            {{- end }}
            {{- if eq .Values.configProvider.mode "file" }}
            - name: app-config
              mountPath: {{ .Values.app.configPaths.config | quote }}
              subPath: config.yaml
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
