apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ksbh.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ksbh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ksbh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        profiles.grafana.com/memory.scrape: "true"
        profiles.grafana.com/memory.port: {{ .Values.service.profiling | quote }}
        profiles.grafana.com/memory.path: "/"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ksbh.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ksbh.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: app-data
          persistentVolumeClaim:
            claimName: {{ include "ksbh.persistenceClaimName" . }}
        {{- end }}
        {{- if eq .Values.configProvider.mode "file" }}
        - name: app-config
          configMap:
            name: {{ include "ksbh.fullname" . }}-app-config
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.ports.app.http }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.app.ports.app.https }}
              protocol: TCP
            - name: internal
              containerPort: {{ include "ksbh.internalPort" . }}
              protocol: TCP
            - name: prometheus
              containerPort: {{ .Values.service.prometheus }}
              protocol: TCP
            - name: profiling
              containerPort: {{ .Values.service.profiling }}
              protocol: TCP
          env:
            {{- $cfgEnv := .Values.configEnv }}
            {{- if not (hasKey $cfgEnv "DEBUG_LEVEL") }}
            - name: DEBUG_LEVEL
              value: {{ .Values.env.DEBUG_LEVEL | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__THREADS") }}
            - name: KSBH__THREADS
              value: {{ .Values.app.threads | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONSTANTS__TCP_FASTOPEN_QUEUE_SIZE") }}
            - name: KSBH__CONSTANTS__TCP_FASTOPEN_QUEUE_SIZE
              value: {{ .Values.app.constants.tcpFastopenQueueSize | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONSTANTS__COOKIE_NAME") }}
            - name: KSBH__CONSTANTS__COOKIE_NAME
              value: {{ .Values.app.constants.cookieName | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONSTANTS__COOKIE_SECURE") }}
            - name: KSBH__CONSTANTS__COOKIE_SECURE
              value: {{ .Values.app.constants.cookieSecure | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONSTANTS__PROXY_HEADER_NAME") }}
            - name: KSBH__CONSTANTS__PROXY_HEADER_NAME
              value: {{ .Values.app.constants.proxyHeaderName | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONSTANTS__PROXY_HEADER_VALUE") }}
            - name: KSBH__CONSTANTS__PROXY_HEADER_VALUE
              value: {{ .Values.app.constants.proxyHeaderValue | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__PORTS__APP__HTTP") }}
            - name: KSBH__PORTS__APP__HTTP
              value: {{ .Values.app.ports.app.http | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__PORTS__APP__HTTPS") }}
            - name: KSBH__PORTS__APP__HTTPS
              value: {{ .Values.app.ports.app.https | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__PORTS__EXTERNAL__HTTP") }}
            - name: KSBH__PORTS__EXTERNAL__HTTP
              value: {{ .Values.app.ports.external.http | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__PORTS__EXTERNAL__HTTPS") }}
            - name: KSBH__PORTS__EXTERNAL__HTTPS
              value: {{ .Values.app.ports.external.https | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__LISTEN_ADDRESSES__HTTP") }}
            - name: KSBH__LISTEN_ADDRESSES__HTTP
              value: {{ .Values.app.listenAddresses.http | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__LISTEN_ADDRESSES__HTTPS") }}
            - name: KSBH__LISTEN_ADDRESSES__HTTPS
              value: {{ .Values.app.listenAddresses.https | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__LISTEN_ADDRESSES__INTERNAL") }}
            - name: KSBH__LISTEN_ADDRESSES__INTERNAL
              value: {{ .Values.app.listenAddresses.internal | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__LISTEN_ADDRESSES__PROFILING") }}
            - name: KSBH__LISTEN_ADDRESSES__PROFILING
              value: {{ .Values.app.listenAddresses.profiling | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__LISTEN_ADDRESSES__PROMETHEUS") }}
            - name: KSBH__LISTEN_ADDRESSES__PROMETHEUS
              value: {{ .Values.app.listenAddresses.prometheus | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONFIG_PATHS__MODULES") }}
            - name: KSBH__CONFIG_PATHS__MODULES
              value: {{ .Values.app.configPaths.modules | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__CONFIG_PATHS__STATIC_CONTENT") }}
            - name: KSBH__CONFIG_PATHS__STATIC_CONTENT
              value: {{ .Values.app.configPaths.staticContent | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__URL_PATHS__MODULES") }}
            - name: KSBH__URL_PATHS__MODULES
              value: {{ .Values.app.urlPaths.modules | quote }}
            {{- end }}
            {{- if and (ne .Values.app.performance.tcpFastopen nil) (not (hasKey $cfgEnv "KSBH__PERFORMANCE__TCP_FASTOPEN")) }}
            - name: KSBH__PERFORMANCE__TCP_FASTOPEN
              value: {{ .Values.app.performance.tcpFastopen | quote }}
            {{- end }}
            {{- if and (ne .Values.app.performance.soReuseport nil) (not (hasKey $cfgEnv "KSBH__PERFORMANCE__SO_REUSEPORT")) }}
            - name: KSBH__PERFORMANCE__SO_REUSEPORT
              value: {{ .Values.app.performance.soReuseport | quote }}
            {{- end }}
            {{- if and (ne .Values.app.performance.tcpKeepalive nil) (not (hasKey $cfgEnv "KSBH__PERFORMANCE__TCP_KEEPALIVE")) }}
            - name: KSBH__PERFORMANCE__TCP_KEEPALIVE
              value: {{ .Values.app.performance.tcpKeepalive | quote }}
            {{- end }}
            {{- if and .Values.app.redisUrl (not (hasKey $cfgEnv "KSBH__REDIS_URL")) }}
            - name: KSBH__REDIS_URL
              value: {{ .Values.app.redisUrl | quote }}
            {{- end }}
            {{- if and .Values.app.pyroscopeUrl (not (hasKey $cfgEnv "KSBH__PYROSCOPE_URL")) }}
            - name: KSBH__PYROSCOPE_URL
              value: {{ .Values.app.pyroscopeUrl | quote }}
            {{- end }}
            {{- range $idx, $proxy := .Values.app.trustedProxies }}
            {{- $proxyEnvName := printf "KSBH__TRUSTED_PROXIES__%d" $idx }}
            {{- if not (hasKey $cfgEnv $proxyEnvName) }}
            - name: {{ $proxyEnvName }}
              value: {{ $proxy | quote }}
            {{- end }}
            {{- end }}
            {{- range $name, $value := .Values.configEnv }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if not (hasKey $cfgEnv "KSBH__COOKIE_KEY") }}
            - name: KSBH__COOKIE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ksbh.cookieKeySecretName" . }}
                  key: {{ .Values.cookieKeySecret.key }}
            {{- end }}
            {{- if and (eq .Values.configProvider.mode "file") (not (hasKey $cfgEnv "KSBH__CONFIG_PATHS__CONFIG")) }}
            - name: KSBH__CONFIG_PATHS__CONFIG
              value: {{ .Values.app.configPaths.config | quote }}
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: app-data
              mountPath: {{ .Values.persistence.mountPath | quote }}
            {{- end }}
            {{- if eq .Values.configProvider.mode "file" }}
            - name: app-config
              mountPath: {{ .Values.app.configPaths.config | quote }}
              subPath: config.yaml
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
